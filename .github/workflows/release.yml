name: Build and Release DMG

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build archive
        run: |
          xcodebuild archive \
            -project TokenUsage.xcodeproj \
            -scheme TokenUsage \
            -configuration Release \
            -archivePath $RUNNER_TEMP/TokenUsage.xcarchive \
            -destination 'generic/platform=macOS' \
            MACOSX_DEPLOYMENT_TARGET=26.0 \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export app
        run: |
          mkdir -p $RUNNER_TEMP/export
          cp -R $RUNNER_TEMP/TokenUsage.xcarchive/Products/Applications/TokenUsage.app $RUNNER_TEMP/export/

      - name: Create DMG
        run: |
          mkdir -p $RUNNER_TEMP/dmg-content
          cp -R $RUNNER_TEMP/export/TokenUsage.app $RUNNER_TEMP/dmg-content/
          ln -s /Applications $RUNNER_TEMP/dmg-content/Applications
          hdiutil create \
            -volname "TokenUsage" \
            -srcfolder $RUNNER_TEMP/dmg-content \
            -ov \
            -format UDZO \
            $RUNNER_TEMP/TokenUsage.dmg

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/TokenUsage.dmg
